name: SEO

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

concurrency:
  group: seo-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    name: Build and audit SEO
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      SEO_SITE_URL: https://lbsailab.com
      SEO_DUPLICATE_ORIGINS: https://lbsailab.zahra-moghadasi.workers.dev

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run build artifact SEO suite
        run: npm run seo:ci

      - name: Run production SEO suite
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}
        run: npm run seo:production

      - name: Submit canonical URLs to IndexNow
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: npm run seo:indexnow

      - name: Upload generated site
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist
          if-no-files-found: ignore
          retention-days: 7
