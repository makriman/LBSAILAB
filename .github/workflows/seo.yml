name: SEO

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

concurrency:
  group: seo-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    name: Build and audit SEO
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      SEO_SITE_URL: https://lbsailab.com
      SEO_DUPLICATE_ORIGINS: https://lbsailab.zahra-moghadasi.workers.dev
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run full SEO suite
        run: npm run seo:all

      - name: Submit canonical URLs to IndexNow
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: npm run seo:indexnow

      - name: Upload generated site
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          if-no-files-found: ignore
          retention-days: 7
